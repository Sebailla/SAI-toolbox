# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: CLI Shell/Bash (scripts bash 3.2+)
  Architecture: Herramienta de scaffolding (patrones Modular/Hexagonal para proyectos generados)
  Testing: Shell scripts - validación de sintaxis con bash -n
  Style: Bash compatible con POSIX, colores ANSI, sed/timeout portable

rules:
  proposal:
    - Incluir plan de rollback para cambios riesgosos
    - Identificar scripts/modules afectados
  specs:
    - Usar formato Given/When/Then para escenarios
    - Usar palabras clave RFC 2119 (MUST, SHALL, SHOULD, MAY)
  design:
    - Incluir diagramas de secuencia para flujos complejos
    - Documentar decisiones de arquitectura con justificación
  tasks:
    - Agrupar tareas por fase (infraestructura, implementación, testing)
    - Usar numeración jerárquica (1.1, 1.2, etc.)
    - Mantener tareas lo suficientemente pequeñas para completar en una sesión
  apply:
    - Seguir patrones y convenciones de código existentes
    - Usar bash -n para validar sintaxis antes de commits
  verify:
    - Ejecutar bash -n en scripts modificados
    - Comparar implementación contra cada escenario de especificación
  archive:
    - Advertir antes de merging deltas destructivas (grandes eliminaciones)
